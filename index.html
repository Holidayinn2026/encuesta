<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Room Service Survey — Holiday Inn Miraflores</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/0/03/Holiday_Inn_Logo.svg/1280px-Holiday_Inn_Logo.svg.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:       #C9A84C;
      --gold-light: #E8D5A3;
      --gold-dark:  #9A7530;
      --deep:       #0D1B2A;
      --navy:       #132030;
      --cream:      #F5F0E8;
      --muted:      #7A8FA8;
      --error:      #E07070;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--deep);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(201,168,76,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 85% 95%, rgba(201,168,76,.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .topbar {
      width: 100%; height: 3px; flex-shrink: 0;
      background: linear-gradient(90deg, transparent 0%, var(--gold-dark) 20%, var(--gold) 50%, var(--gold-light) 65%, var(--gold) 80%, transparent 100%);
    }

    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
      padding: 0 20px 80px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* HEADER */
    header {
      width: 100%; text-align: center;
      padding: 52px 0 40px;
    }
    .logo-wrap {
      display: inline-block; margin-bottom: 24px;
      animation: fadeDown .7s ease both;
    }
    .logo-wrap img {
      height: 52px;
      filter: brightness(0) invert(1); opacity: .9;
    }
    .hotel-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 300;
      letter-spacing: .4em; text-transform: uppercase;
      color: var(--gold-light);
      animation: fadeDown .7s .08s ease both;
    }
    .divider-line {
      width: 56px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
      animation: fadeDown .7s .16s ease both;
    }
    .survey-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 3rem); font-weight: 500;
      line-height: 1.12; letter-spacing: .03em;
      animation: fadeDown .7s .22s ease both;
    }
    .survey-sub {
      font-size: .78rem; font-weight: 300;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); margin-top: 10px;
      animation: fadeDown .7s .28s ease both;
    }
    .lang-toggle {
      display: inline-flex; margin-top: 26px;
      border: 1px solid rgba(201,168,76,.3); border-radius: 3px; overflow: hidden;
      animation: fadeDown .7s .34s ease both;
    }
    .lang-btn {
      background: none; border: none;
      color: var(--muted); font-family: 'Jost', sans-serif;
      font-size: .74rem; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 8px 22px; cursor: pointer;
      transition: background .2s, color .2s;
    }
    .lang-btn + .lang-btn { border-left: 1px solid rgba(201,168,76,.3); }
    .lang-btn.active { background: var(--gold); color: var(--deep); }

    /* CARD */
    .card {
      position: relative; width: 100%;
      background: var(--navy);
      border: 1px solid rgba(201,168,76,.16);
      border-radius: 6px;
      padding: clamp(32px,7vw,56px) clamp(28px,7vw,56px);
      box-shadow: 0 0 0 1px rgba(255,255,255,.025) inset,
                  0 32px 80px rgba(0,0,0,.5);
      animation: fadeUp .8s .4s ease both;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,213,163,.45), transparent);
    }
    .card::after {
      content: '✦';
      position: absolute; top: 14px; right: 20px;
      font-size: .7rem; color: rgba(201,168,76,.22);
    }

    /* NAME */
    .name-section { margin-bottom: 38px; }
    .field-label {
      display: block; font-size: .68rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .name-input {
      width: 100%;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(201,168,76,.22); border-radius: 3px;
      color: var(--cream); font-family: 'Jost', sans-serif;
      font-size: .95rem; font-weight: 300;
      padding: 14px 18px; outline: none;
      transition: border-color .25s, background .25s, box-shadow .25s;
    }
    .name-input::placeholder { color: var(--muted); }
    .name-input:focus {
      border-color: var(--gold); background: rgba(201,168,76,.04);
      box-shadow: 0 0 0 3px rgba(201,168,76,.08);
    }

    /* SEP */
    .sep {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,.18), transparent);
      margin: 34px 0;
    }

    /* QUESTION BLOCK */
    .q-block { margin-bottom: 38px; }
    .q-num {
      font-size: .64rem; letter-spacing: .24em; text-transform: uppercase;
      color: var(--gold-dark); margin-bottom: 7px;
    }
    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 400; line-height: 1.45;
      color: var(--cream); margin-bottom: 22px; text-align: center;
    }

    /* ── STARS ── */
    .star-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      user-select: none;
    }

    .star-cell {
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
    }

    .star-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; outline: none;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      /* prevent any browser default that could interfere */
      -webkit-appearance: none; appearance: none;
    }

    .star-svg {
      width: 44px; height: 44px; display: block;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1),
                  filter .2s;
    }
    .star-path {
      fill: rgba(201,168,76,.12);
      stroke: rgba(201,168,76,.3);
      stroke-width: 1.5;
      transition: fill .15s, stroke .15s;
    }

    /* Hover preview only while mouse is over that cell */
    .star-btn:hover .star-path {
      fill: rgba(201,168,76,.45);
      stroke: var(--gold);
    }
    .star-btn:hover .star-svg {
      transform: scale(1.1);
    }

    /* Selected (lit) — class driven, stable */
    .star-cell.lit .star-path {
      fill: var(--gold);
      stroke: var(--gold-light);
    }
    .star-cell.lit .star-svg {
      transform: scale(1.15);
      filter: drop-shadow(0 2px 8px rgba(201,168,76,.5));
    }

    .star-num {
      font-size: .6rem; letter-spacing: .1em;
      color: var(--muted); transition: color .15s; pointer-events: none;
    }
    .star-cell.lit .star-num { color: var(--gold); }

    /* Answer pill */
    .star-answer { text-align: center; margin-top: 14px; min-height: 28px; }
    .star-pill {
      display: inline-block;
      background: rgba(201,168,76,.1);
      border: 1px solid rgba(201,168,76,.28);
      border-radius: 20px;
      padding: 4px 18px;
      font-size: .72rem; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--gold-light);
      opacity: 0; transform: translateY(4px);
      transition: opacity .25s, transform .25s;
    }
    .star-pill.show { opacity: 1; transform: translateY(0); }

    /* COMMENT */
    .comment-label {
      display: block; font-size: .68rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .comment-textarea {
      width: 100%; background: rgba(255,255,255,.035);
      border: 1px solid rgba(201,168,76,.22); border-radius: 3px;
      color: var(--cream); font-family: 'Jost', sans-serif;
      font-size: .9rem; font-weight: 300;
      padding: 14px 18px; resize: vertical; min-height: 90px;
      outline: none;
      transition: border-color .25s, background .25s, box-shadow .25s;
    }
    .comment-textarea::placeholder { color: var(--muted); }
    .comment-textarea:focus {
      border-color: var(--gold); background: rgba(201,168,76,.04);
      box-shadow: 0 0 0 3px rgba(201,168,76,.08);
    }

    /* ERROR */
    .error-msg {
      font-size: .78rem; color: var(--error);
      letter-spacing: .06em; margin-top: 18px;
      display: none; text-align: center;
    }

    /* SUBMIT */
    .submit-wrap { margin-top: 38px; text-align: center; }
    .submit-btn {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold) 55%, var(--gold-light));
      border: none; border-radius: 3px;
      color: var(--deep); font-family: 'Jost', sans-serif;
      font-size: .78rem; font-weight: 600;
      letter-spacing: .26em; text-transform: uppercase;
      padding: 16px 52px; cursor: pointer;
      transition: opacity .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 6px 28px rgba(201,168,76,.28), 0 2px 8px rgba(0,0,0,.3);
    }
    .submit-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 60%);
      pointer-events: none;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(201,168,76,.38), 0 4px 12px rgba(0,0,0,.3);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: .6; cursor: default; }

    /* SUCCESS */
    .success-screen {
      display: none; text-align: center;
      padding: 16px 0 8px;
    }
    .success-ornament {
      font-size: 2.4rem; color: var(--gold);
      margin-bottom: 18px;
      animation: pulse 2.8s ease infinite;
      display: block;
    }
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 6vw, 2.6rem); font-weight: 500;
      color: var(--cream); margin-bottom: 12px; line-height: 1.15;
    }
    .success-stars {
      font-size: 2rem; color: var(--gold);
      letter-spacing: .12em; margin-bottom: 20px;
      filter: drop-shadow(0 2px 8px rgba(201,168,76,.4));
    }
    .success-sub {
      font-size: .88rem; font-weight: 300; line-height: 1.75;
      color: var(--muted); letter-spacing: .04em; margin-bottom: 36px;
    }
    .exit-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(201,168,76,.08);
      border: 1px solid rgba(201,168,76,.3); border-radius: 3px;
      color: var(--gold-light); font-family: 'Jost', sans-serif;
      font-size: .76rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      padding: 14px 36px; cursor: pointer;
      transition: background .22s, border-color .22s, transform .18s, box-shadow .22s;
    }
    .exit-btn:hover {
      background: rgba(201,168,76,.15); border-color: var(--gold);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
    }
    .exit-btn svg {
      width: 14px; height: 14px;
      stroke: var(--gold-light); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .75; transform: scale(1.08); }
    }

    @media (max-width: 420px) {
      .star-svg { width: 36px; height: 36px; }
      .star-row { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="topbar"></div>

<div class="page">

  <header>
    <div class="logo-wrap">
      <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/03/Holiday_Inn_Logo.svg/1280px-Holiday_Inn_Logo.svg.png" alt="Holiday Inn"/>
    </div>
    <div class="hotel-name">Miraflores &nbsp;·&nbsp; Lima</div>
    <div class="divider-line"></div>
    <h1 class="survey-title" id="mainTitle">Encuesta de<br>Room Service</h1>
    <p class="survey-sub" id="mainSubtitle">Su opinión es muy importante &nbsp;·&nbsp; menos de 1 minuto</p>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnEs" onclick="setLang('es')">ES</button>
      <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <div class="card" id="formCard">

    <form id="surveyForm" onsubmit="submitForm(event)" novalidate>

      <div class="name-section">
        <label class="field-label" id="labelName" for="guestName">Nombre del huésped</label>
        <input class="name-input" type="text" id="guestName"
               placeholder="Ingrese su nombre" autocomplete="name"/>
      </div>

      <div class="sep"></div>

      <div id="q-container"></div>

      <div class="sep"></div>

      <div>
        <label class="comment-label" id="labelComment" for="comment">Comentario adicional (opcional)</label>
        <textarea class="comment-textarea" id="comment"
                  placeholder="Comparta su experiencia..." rows="3"></textarea>
      </div>

      <p class="error-msg" id="errorMsg"></p>

      <div class="submit-wrap">
        <button type="submit" class="submit-btn" id="submitBtn">Enviar encuesta</button>
      </div>

    </form>

    <div class="success-screen" id="successScreen">
      <span class="success-ornament">✦</span>
      <div class="success-title" id="successTitle">¡Gracias por su opinión!</div>
      <div class="success-stars" id="successStars">★★★★</div>
      <p   class="success-sub"   id="successSub">Su respuesta ha sido registrada.<br>Esperamos que haya disfrutado su estadía.</p>
      <button class="exit-btn" onclick="closePage()">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span id="exitLabel">Cerrar encuesta</span>
      </button>
    </div>

  </div>
</div>

<script>
/* ── CONTENT ── */
const C = {
  es: {
    mainTitle:    'Encuesta de<br>Room Service',
    mainSub:      'Su opinión es muy importante &nbsp;·&nbsp; menos de 1 minuto',
    labelName:    'Nombre del huésped',
    namePH:       'Ingrese su nombre',
    qnums:        ['Pregunta 01','Pregunta 02','Pregunta 03','Pregunta 04','Pregunta 05'],
    questions: [
      '¿Cómo calificaría la puntualidad en la entrega de su pedido?',
      '¿Cómo evaluaría la presentación de su pedido?',
      '¿Cómo calificaría la calidad y el sabor de los alimentos?',
      '¿Cómo calificaría la atención brindada por nuestro equipo?',
      'En general, ¿qué tan satisfecho(a) se encuentra con el servicio de Room Service?',
    ],
    opts14: ['Excelente','Bueno','Regular','Malo'],
    opts5:  ['Muy satisfecho(a)','Satisfecho(a)','Neutral','Insatisfecho(a)'],
    labelComment: 'Comentario adicional (opcional)',
    commentPH:    'Comparta su experiencia...',
    submitBtn:    'Enviar encuesta',
    errName:      'Por favor ingrese su nombre.',
    errAll:       'Por favor responda todas las preguntas antes de enviar.',
    successTitle: '¡Gracias por su opinión!',
    successSub:   'Su respuesta ha sido registrada.<br>Esperamos que haya disfrutado su estadía.',
    exitLabel:    'Cerrar encuesta',
  },
  en: {
    mainTitle:    'Room Service<br>Survey',
    mainSub:      'Your feedback matters &nbsp;·&nbsp; less than 1 minute',
    labelName:    'Guest Name',
    namePH:       'Enter your name',
    qnums:        ['Question 01','Question 02','Question 03','Question 04','Question 05'],
    questions: [
      'How would you rate the timeliness of your room service?',
      'How would you evaluate the presentation of your order?',
      'How would you rate the quality and taste of the food?',
      'How would you assess the service provided by our team?',
      'Overall, how satisfied are you with your Room Service experience?',
    ],
    opts14: ['Excellent','Good','Fair','Poor'],
    opts5:  ['Very satisfied','Satisfied','Neutral','Dissatisfied'],
    labelComment: 'Additional comments (optional)',
    commentPH:    'Share your experience...',
    submitBtn:    'Submit survey',
    errName:      'Please enter your name.',
    errAll:       'Please answer all questions before submitting.',
    successTitle: 'Thank you for your feedback!',
    successSub:   'Your response has been recorded.<br>We hope you enjoyed your stay.',
    exitLabel:    'Close survey',
  }
};

/* ── STATE ── */
let lang = 'es';
// answers[i] = number of stars selected (1-4), or null
const answers = { 1: null, 2: null, 3: null, 4: null, 5: null };

/* ── BUILD ONE QUESTION WITH STAR WIDGET ── */
function buildQuestion(idx, c) {
  const opts = idx < 5 ? c.opts14 : c.opts5;
  // opts[0] = best (4★), opts[3] = worst (1★)

  const block = document.createElement('div');
  block.className = 'q-block';
  block.id = 'qblock' + idx;

  // Question header
  const qNum  = document.createElement('div');
  qNum.className = 'q-num';
  qNum.id = 'qnum' + idx;
  qNum.textContent = c.qnums[idx - 1];

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.id = 'qtext' + idx;
  qText.textContent = c.questions[idx - 1];

  // Star row
  const row = document.createElement('div');
  row.className = 'star-row';
  row.id = 'srow' + idx;

  for (let s = 1; s <= 4; s++) {
    const label = opts[4 - s]; // s=4→opts[0] best, s=1→opts[3] worst

    const cell = document.createElement('div');
    cell.className = 'star-cell';
    cell.id = 'sc_' + idx + '_' + s;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'star-btn';
    btn.setAttribute('aria-label', s + ' ' + (s === 1 ? 'estrella' : 'estrellas') + ' — ' + label);

    btn.innerHTML =
      '<svg class="star-svg" viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg">' +
        '<path class="star-path" d="M25.5 2l6.18 12.53 13.82 2.01-10 9.74 2.36 13.77' +
        'L25.5 33.5l-12.36 6.5 2.36-13.77-10-9.74 13.82-2.01z"/>' +
      '</svg>';

    const num = document.createElement('span');
    num.className = 'star-num';
    num.textContent = s + '★';
    num.setAttribute('aria-hidden', 'true');

    cell.appendChild(btn);
    cell.appendChild(num);
    row.appendChild(cell);

    // Click — the only way state changes
    btn.addEventListener('click', function() {
      selectStar(idx, s, opts);
    });
  }

  // Answer pill
  const answerWrap = document.createElement('div');
  answerWrap.className = 'star-answer';

  const pill = document.createElement('span');
  pill.className = 'star-pill';
  pill.id = 'pill' + idx;

  answerWrap.appendChild(pill);

  block.appendChild(qNum);
  block.appendChild(qText);
  block.appendChild(row);
  block.appendChild(answerWrap);

  return block;
}

/* ── SELECT STAR — single, authoritative function ── */
function selectStar(idx, stars, opts) {
  answers[idx] = stars;

  // Update visual state from scratch every time
  for (let k = 1; k <= 4; k++) {
    const cell = document.getElementById('sc_' + idx + '_' + k);
    if (cell) {
      if (k <= stars) {
        cell.classList.add('lit');
      } else {
        cell.classList.remove('lit');
      }
    }
  }

  // Show pill: stars=4→opts[0], stars=1→opts[3]
  const label = opts[4 - stars];
  const pill  = document.getElementById('pill' + idx);
  if (pill) {
    pill.textContent = label;
    pill.classList.add('show');
  }

  // Hide error if all done
  if (Object.values(answers).every(function(v) { return v !== null; })) {
    document.getElementById('errorMsg').style.display = 'none';
  }
}

/* ── SET LANGUAGE ── */
function setLang(newLang) {
  lang = newLang;
  var c = C[lang];

  document.getElementById('mainTitle').innerHTML     = c.mainTitle;
  document.getElementById('mainSubtitle').innerHTML  = c.mainSub;
  document.getElementById('labelName').textContent   = c.labelName;
  document.getElementById('guestName').placeholder   = c.namePH;
  document.getElementById('labelComment').textContent = c.labelComment;
  document.getElementById('comment').placeholder     = c.commentPH;
  document.getElementById('submitBtn').textContent   = c.submitBtn;
  document.getElementById('errorMsg').style.display  = 'none';

  // Rebuild question blocks
  var container = document.getElementById('q-container');
  container.innerHTML = '';
  for (var i = 1; i <= 5; i++) {
    container.appendChild(buildQuestion(i, c));
  }

  // Re-apply existing answers with new language labels
  for (var j = 1; j <= 5; j++) {
    if (answers[j] !== null) {
      var opts = j < 5 ? c.opts14 : c.opts5;
      selectStar(j, answers[j], opts);
    }
  }

  document.getElementById('btnEs').classList.toggle('active', lang === 'es');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
}

/* ── SUBMIT ── */
async function submitForm(e) {
  e.preventDefault();
  var c     = C[lang];
  var errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  var name = document.getElementById('guestName').value.trim();
  if (!name) {
    errEl.textContent   = c.errName;
    errEl.style.display = 'block';
    document.getElementById('guestName').focus();
    return;
  }

  for (var i = 1; i <= 5; i++) {
    if (answers[i] === null) {
      errEl.textContent   = c.errAll;
      errEl.style.display = 'block';
      document.getElementById('qblock' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }

  // Resolve text labels
  function getLabel(idx) {
    var opts = idx < 5 ? c.opts14 : c.opts5;
    return opts[4 - answers[idx]]; // stars=4→opts[0], stars=1→opts[3]
  }

  var comment = document.getElementById('comment').value.trim();
  var btn     = document.getElementById('submitBtn');
  btn.textContent = lang === 'es' ? 'Enviando…' : 'Sending…';
  btn.disabled    = true;

  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyLKm7uMCOhH_iSrGkafyT0UOPqPkAzhO6JR5Ul5EXK0brzupevA1pgpgt--MnNQuXN/exec'; // ← reemplazar

  var payload = {
    timestamp:    new Date().toLocaleString('es-PE', { timeZone: 'America/Lima' }),
    nombre:       name,
    idioma:       lang === 'es' ? 'Español' : 'English',
    puntualidad:  getLabel(1),
    presentacion: getLabel(2),
    calidad:      getLabel(3),
    atencion:     getLabel(4),
    satisfaccion: getLabel(5),
    comentario:   comment || '—',
  };

  try {
    await fetch(SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
  } catch (_) {}

  // Avg stars display
  var total = 0;
  for (var k = 1; k <= 5; k++) total += answers[k];
  var avgStars = Math.round(total / 5);
  document.getElementById('successStars').textContent = '★'.repeat(avgStars);

  document.getElementById('successTitle').textContent   = c.successTitle;
  document.getElementById('successSub').innerHTML       = c.successSub;
  document.getElementById('exitLabel').textContent      = c.exitLabel;

  document.getElementById('surveyForm').style.display   = 'none';
  var ss = document.getElementById('successScreen');
  ss.style.display = 'block';
  ss.style.animation = 'fadeUp .6s ease both';
}

/* ── CLOSE ── */
function closePage() {
  window.close();
  // Fallback if browser blocks window.close
  setTimeout(function() {
    var btn = document.querySelector('.exit-btn');
    if (btn) {
      btn.innerHTML = lang === 'es'
        ? '<span>Puede cerrar esta pestaña manualmente</span>'
        : '<span>You may close this tab manually</span>';
      btn.style.opacity = '.55';
      btn.style.cursor  = 'default';
      btn.onclick = null;
    }
  }, 350);
}

/* ── INIT ── */
setLang('es');
</script>
